<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cemtube 2.0</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
    --orange: #ff9000;
    --purple: #9d00ff;
    --cyan: #00ffe0;
    --bg: #0f0f0f;
    --nav: #1a1a1a;
    --text: #fff;
    --card-bg: #1e1e1e;
    --glow: rgba(255,144,0,0.25);
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { margin:0; font-family:'Roboto', sans-serif; background: var(--bg); color: var(--text); overflow-x:hidden; }
nav { position: fixed; top:0; width:100%; height:60px; background: linear-gradient(90deg, var(--purple), var(--cyan)); display:flex; justify-content:space-between; align-items:center; padding:0 20px; z-index:1000; box-shadow:0 4px 10px rgba(0,0,0,0.4); border-bottom:1px solid #222; }
nav .logo { font-size:22px; font-weight:bold; cursor:pointer; color:#fff; text-shadow:0 0 6px rgba(255,255,255,0.3);}
nav .logo span { background: var(--orange); color:#000; padding:2px 6px; border-radius:5px; margin-left:4px; font-size:16px; }
nav .user-area { display:flex; align-items:center; gap:12px; }
.user-pill { background:#222; padding:6px 14px; border-radius:25px; font-size:12px; color:#aaa; font-weight:bold; border:1px solid #333; transition:0.2s; }
.user-pill:hover { background:var(--orange); color:#000; border:none; }
button.logout-btn { background:none; border:none; color:#ff4444; font-size:11px; cursor:pointer; font-weight:bold; transition:0.2s; }
button.logout-btn:hover { text-shadow:0 0 4px #ff4444; }

aside { width:220px; position:fixed; top:60px; left:0; height:calc(100vh - 60px); background: linear-gradient(180deg,#111,#1a1a1a); border-right:1px solid #222; overflow-y:auto; padding-top:10px; transition:0.3s; box-shadow:2px 0 10px rgba(0,0,0,0.5); }
.side-item { padding:12px 20px; display:flex; align-items:center; gap:12px; cursor:pointer; font-size:14px; color:#aaa; border-radius:10px; transition:0.2s; }
.side-item:hover { color:#fff; background: linear-gradient(90deg, var(--orange), var(--purple)); box-shadow:0 0 10px var(--glow); font-weight:bold; }
.side-item.active { background: linear-gradient(90deg,var(--cyan),var(--purple)); color:#fff; font-weight:bold; box-shadow:0 0 10px var(--glow); }

main { margin-left:220px; margin-top:60px; padding:25px; transition:0.3s; }
.grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap:20px; }

.card { background: var(--card-bg); border-radius:15px; overflow:hidden; cursor:pointer; box-shadow:0 2px 6px rgba(0,0,0,0.4); transition:0.3s; }
.card:hover { transform: translateY(-4px); box-shadow:0 8px 20px var(--glow); }
.v-thumb { width:100%; aspect-ratio:16/9; object-fit:cover; display:block; transition: transform 0.2s, filter 0.3s; border-radius:15px; }
.card:hover .v-thumb { transform: scale(1.03); filter: brightness(1.1); }

.v-meta { padding:12px 8px; display:flex; gap:12px; align-items:center; }
.v-avatar { width:36px; height:36px; border-radius:50%; background: linear-gradient(135deg, var(--purple), var(--cyan)); display:flex; justify-content:center; align-items:center; font-weight:bold; color:#fff; flex-shrink:0; box-shadow:0 0 8px var(--glow); }
.v-info h4 { margin:0; font-size:14px; color:#fff; line-height:1.3; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.v-info p { margin:4px 0 0; font-size:12px; color:#aaa; display:flex; align-items:center; }
.checkmark { color: var(--orange); font-size:11px; margin-left:4px; }

#player-page { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:2000; }
.video-wrapper { width:100%; max-width:1000px; margin:20px auto; aspect-ratio:16/9; background:#111; border-radius:12px; overflow:hidden; box-shadow:0 0 20px var(--glow);}
iframe { width:100%; height:100%; border:none; }
.player-back { font-size:24px; cursor:pointer; color:#fff; padding:15px; display:inline-block; text-shadow:0 0 6px rgba(255,255,255,0.3); }

#modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.95); z-index:3000; padding:20px; display:flex; align-items:center; justify-content:center; }
.box { background: linear-gradient(145deg,#1b1b1b,#2c2c2c); padding:25px; border-radius:20px; width:100%; max-width:400px; border:1px solid #333; text-align:center; box-shadow:0 0 20px var(--glow);}
.file-label { font-size:13px; color:#aaa; display:block; margin-bottom:10px; text-align:left; }
.limit-tag { color: var(--orange); font-weight:bold; margin-left:5px; }

.bottom-nav { display:none; position:fixed; bottom:0; width:100%; background:linear-gradient(90deg,var(--purple),var(--cyan)); height:60px; border-top:1px solid #222; justify-content:space-around; align-items:center; z-index:1001; box-shadow:0 -4px 10px rgba(0,0,0,0.5); }
.b-nav-item { font-size:22px; cursor:pointer; color:#fff; text-shadow:0 0 6px rgba(255,255,255,0.3); }

@media(max-width:768px){
    aside{display:none;}
    main{margin-left:0;}
    .grid{grid-template-columns:1fr; gap:25px;}
    .v-thumb{border-radius:12px;}
    .bottom-nav{display:flex;}
}
</style>
</head>
<body>

<nav>
    <a class="logo" onclick="location.reload()">Cem<span>tube</span></a>
    <div class="user-area">
        <div class="user-pill" id="user-display">User</div>
        <button class="logout-btn" onclick="logout()">LOGOUT</button>
    </div>
</nav>

<aside>
    <div class="side-item active" onclick="switchSection('home')">🏠 Home</div>
    <div class="side-item" onclick="switchSection('trending')">🔥 Trending</div>
    <div class="side-item" onclick="switchSection('subscriptions')">🎬 Subscriptions</div>
    <hr style="border:0;border-top:1px solid #222;margin:10px 0;">
    <div class="side-item" onclick="switchSection('library')">📂 Library</div>
    <div class="side-item" onclick="switchSection('history')">🕒 History</div>
    <div class="side-item" onclick="switchSection('liked')">❤️ Liked Videos</div>
    <div class="side-item" onclick="openModal()" style="color:var(--orange); font-weight:bold;">➕ Upload</div>
</aside>

<main>
    <h3 id="section-title" style="margin-top:0; color:#ddd; font-weight:500;">Recommended for you</h3>
    <div class="grid" id="main-grid">
        <div style="color:#555; font-size:13px; font-style:italic;">Initializing Cemtube 2TB Hub...</div>
    </div>
</main>

<div class="bottom-nav">
    <div class="b-nav-item" onclick="switchSection('home')">🏠</div>
    <div class="b-nav-item" onclick="switchSection('trending')">🩳</div>
    <div class="b-nav-item" onclick="openModal()" style="font-size:28px; color:var(--orange)">⊕</div>
    <div class="b-nav-item" onclick="switchSection('notifications')">🔔</div>
    <div class="b-nav-item" onclick="logout()">👤</div>
</div>

<div id="modal">
    <div class="box">
        <h3 style="margin-top:0; color:var(--orange);">Upload Video</h3>
        <p style="font-size:11px;color:#666;margin-bottom:20px;">Upload speed depends on Google Drive.</p>
        <label class="file-label">Choose Video <span class="limit-tag">(MAX 50MB)</span></label>
        <input type="file" id="vid-input" accept="video/*" style="color:white;font-size:12px;margin-bottom:20px;width:100%;">
        <div id="up-status" style="font-size:10px;color:#888;margin-bottom:8px;"></div>
        <div class="prog-bg" id="prog-bg" style="display:none;"><div class="prog-bar" id="prog-bar" style="width:0%;height:4px;background:var(--orange);border-radius:2px;transition:0.3s;"></div></div>
        <button id="start-btn" onclick="handleUpload()" style="background:var(--text); color:#000; border:none; padding:12px; width:100%; font-weight:bold; border-radius:25px; cursor:pointer; transition:0.2s;">Publish Video</button>
        <p onclick="closeModal()" style="color:#555; cursor:pointer; margin-top:20px; font-size:12px; font-weight:bold;">DISMISS</p>
    </div>
</div>

<div id="player-page">
    <span class="player-back" onclick="closePlayer()">✕ Close Player</span>
    <div class="video-wrapper" id="player-target"></div>
    <div style="padding:20px; max-width:1000px; margin:0 auto;">
        <h4 id="p-title" style="margin:0; font-size:20px; font-weight:500;"></h4>
        <div style="display:flex; align-items:center; gap:10px; margin-top:15px; border-top:1px solid #222; padding-top:15px;">
            <div class="v-avatar" id="p-avatar"></div>
            <div>
                <p id="p-uploader" style="color:#fff; font-size:14px; margin:0; font-weight:bold;"></p>
                <p style="color:#aaa; font-size:12px; margin:4px 0 0;">Published via Cemtube Hub</p>
            </div>
        </div>
    </div>
</div>

<script>
const SCRIPT_URL = "YOUR_GOOGLE_SCRIPT_URL_HERE";
const THUMB = "https://raw.githubusercontent.com/portonvpn/cemtube/main/t.png";
let currentUser = localStorage.getItem('cem_user');
let userPass = localStorage.getItem('cem_pass');

// --- PASSWORD SYSTEM ---
async function initUser() {
    const correctPass = "cemtube123"; // your password
    if(!currentUser || !userPass) {
        currentUser = prompt("Enter your Channel Name:");
        if(!currentUser) return initUser();
        userPass = prompt("Enter Password:");
        if(userPass !== correctPass) { alert("Incorrect password!"); return initUser(); }
        localStorage.setItem('cem_user', currentUser);
        localStorage.setItem('cem_pass', userPass);
    }
    document.getElementById('user-display').innerText = currentUser;
}

function logout(){
    localStorage.removeItem('cem_user');
    localStorage.removeItem('cem_pass');
    location.reload();
}

// --- DATA ---
let allVideos = [];
let likedVideos = [];

// --- LOAD HOME ---
async function loadHome() {
    const grid = document.getElementById('main-grid');
    try {
        const res = await fetch(SCRIPT_URL);
        const data = await res.json();
        allVideos = data.reverse();
        renderVideos(allVideos);
    } catch(e) {
        grid.innerHTML = "<div style='color:red'>Failed to connect. Check Script URL.</div>";
    }
}

// --- RENDER VIDEOS ---
function renderVideos(videos) {
    const grid = document.getElementById('main-grid');
    grid.innerHTML = "";
    videos.forEach(v => {
        const isZoro = v.uploader.toLowerCase().includes('zoro');
        const name = isZoro?'Zoro(dev)':v.uploader;
        const initial = name.charAt(0).toUpperCase();
        grid.innerHTML += `
        <div class="card" onclick="openPlayer('${v.id}','${v.name}','${name}',${isZoro})">
            <img src="${THUMB}" class="v-thumb" loading="lazy">
            <div class="v-meta">
                <div class="v-avatar">${initial}</div>
                <div class="v-info">
                    <h4>${v.name}</h4>
                    <p>${name}${isZoro?'<span class="checkmark">✔</span>':''} • Cemtube 2TB</p>
                    <button onclick="likeVideo(event,'${v.id}','${v.name}','${name}',${isZoro})" style="font-size:12px;margin-top:4px;background:#222;color:#fff;padding:3px 6px;border-radius:5px;border:none;cursor:pointer;">❤️ Like</button>
                </div>
            </div>
        </div>`;
    });
}

// --- SWITCH SECTIONS ---
function switchSection(section){
    document.querySelectorAll('.side-item').forEach(s=>s.classList.remove('active'));
    document.querySelector(`.side-item:contains(${section.charAt(0).toUpperCase()+section.slice(1)})`)?.classList.add('active');

    const title = document.getElementById('section-title');
    if(section==='home'){ title.innerText="Recommended for you"; renderVideos(allVideos); }
    else if(section==='trending'){ title.innerText="🔥 Trending"; renderVideos(allVideos.slice(0,8)); }
    else if(section==='subscriptions'){ title.innerText="🎬 Subscriptions"; renderVideos(allVideos.filter(v=>v.subscribed)); }
    else if(section==='library'){ title.innerText="📂 Library"; renderVideos(allVideos); }
    else if(section==='history'){ title.innerText="🕒 History"; renderVideos(allVideos.filter(v=>v.watched)); }
    else if(section==='liked'){ title.innerText="❤️ Liked Videos"; renderVideos(likedVideos); }
}

// --- LIKE VIDEO ---
function likeVideo(e,id,name,uploader,isZoro){
    e.stopPropagation();
    likedVideos.push({id,name,uploader,isZoro});
    alert("Video added to Liked Videos!");
}

// --- PLAYER ---
function openPlayer(id,name,uploader,isZoro){
    document.getElementById('player-page').style.display='block';
    document.getElementById('p-title').innerText=name;
    document.getElementById('p-uploader').innerHTML=uploader+(isZoro?'<span class="checkmark">✔</span>':'');
    document.getElementById('p-avatar').innerText=uploader.charAt(0).toUpperCase();
    document.getElementById('player-target').innerHTML=`<iframe src="https://drive.google.com/file/d/${id}/preview" allow="autoplay"></iframe>`;
    window.scrollTo(0,0);
    document.body.style.overflow="hidden";
}

function closePlayer(){
    document.getElementById('player-page').style.display='none';
    document.getElementById('player-target').innerHTML="";
    document.body.style.overflow="auto";
}

// --- MODAL ---
function openModal(){ document.getElementById('modal').style.display='flex'; }
function closeModal(){ document.getElementById('modal').style.display='none'; }

// --- UPLOAD ---
async function handleUpload(){
    const file=document.getElementById('vid-input').files[0];
    if(!file) return alert("Select a video!");
    if(file.size>50*1024*1024) return alert("Max 50MB");
    const btn=document.getElementById('start-btn'); const status=document.getElementById('up-status');
    btn.disabled=true; btn.style.opacity="0.5"; document.getElementById('prog-bg').style.display='block'; 
    status.innerText="Syncing with Cemtube Drive...";
    const reader=new FileReader();
    reader
